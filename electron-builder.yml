appId: com.nullify.app
productName: Nullify
copyright: Copyright © 2025 Nullify

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*

mac:
  category: public.app-category.utilities
  extendInfo:
    NSMicrophoneUsageDescription: "Nullify needs microphone access to route audio through the shield and protect against transcription tools."
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.inherit.plist
  target:
    - target: dmg
      arch:
        - x64
        - arm64

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
