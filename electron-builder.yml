appId: com.antigranola.app
productName: Anti Granola
copyright: Copyright © 2025 Anti Granola

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*

mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch:
        - x64
        - arm64

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
